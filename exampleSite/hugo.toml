baseURL = "https://toozej.github.io/galleriesdeluxe"

[taxonomies]
    category = 'categories'

[caches]
    [caches.images]
        dir    = ':cacheDir/galleriesdeluxe'
        maxAge = "4320h"                     # 6 months.

[params]
    [params.author]
        name        = "Bjørn Erik Pedersen"
        email       = "bjorn.erik.pedersen@gmail.com"
        description = "A Hugo gallery website"

    [params.galleriesdeluxe]
        gallery_section = "collections"
        galleries_alias = "collections"

        sass_transpiler = "dartsass"
        [params.galleriesdeluxe.sassvars]
            color_background       = "#1d1e2c"
            color_background_dark  = "#1d1e2c"
            color_text_dark        = "#ffffff"
            color_link_dark        = "#fbb7c0"
            color_background_light = "#c5c2bdf2"
            color_text_light       = "#000000"
            color_link_light       = "#b05a75"

[params.gallerydeluxe]
    shuffle     = false
    reverse     = true
    enable_exif = false

    [params.gallerydeluxe.watermark]
        image = "images/watermark.png" # relative to /assets
        posx  = "left"                    # one of "left", "center", "right"
        posy  = "bottom"                  # one of "top", "center", "bottom"

[module]
    [[module.mounts]]
        source = "assets"
        target = "assets"
    [[module.mounts]]
        source = "content"
        target = "content"

    [[module.imports]]
        path = "github.com/toozej/galleriesdeluxe"
